<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="OCRExtract — Live dashboard for monitoring scanned PDF question paper extraction progress." />
  <title>OCRExtract — Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%233b82f6'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='white'%3E📄%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- ── Header ──────────────────────────────────────────────────── -->
  <header>
    <div class="container">
      <div class="header-inner">
        <div class="logo">
          <div class="logo-icon">📄</div>
          <div class="logo-text">
            <h1>OCRExtract</h1>
            <p>Question Paper Intelligence Pipeline</p>
          </div>
        </div>
        <div style="display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
          <div class="header-badge">
            <div class="status-dot" id="status-dot"></div>
            <span id="status-label">Idle</span>
          </div>
          <button id="btn-download" aria-label="Download Excel output">
            ⬇ Download Excel
          </button>
          <button id="btn-stop" aria-label="Stop the OCR pipeline" style="display:none;">
            ⏹ Stop
          </button>
          <button id="btn-start" aria-label="Start the OCR pipeline">
            ▶ Start Processing
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── Main ────────────────────────────────────────────────────── -->
  <main>
    <div class="container">

      <!-- Stats Grid -->
      <div class="stats-grid" role="region" aria-label="Processing statistics">
        <div class="stat-card">
          <div class="stat-icon blue">📂</div>
          <div>
            <div class="stat-value" id="stat-total">—</div>
            <div class="stat-label">Total PDFs</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon cyan">✅</div>
          <div>
            <div class="stat-value" id="stat-processed">—</div>
            <div class="stat-label">Processed</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon green">📊</div>
          <div>
            <div class="stat-value" id="stat-rows">—</div>
            <div class="stat-label">Rows Extracted</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon red">⚠️</div>
          <div>
            <div class="stat-value" id="stat-errors">—</div>
            <div class="stat-label">Errors</div>
          </div>
        </div>
        <div class="stat-card">
          <div class="stat-icon purple">⏱</div>
          <div>
            <div class="stat-value" id="stat-elapsed">00:00</div>
            <div class="stat-label">Elapsed</div>
          </div>
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-section" role="region" aria-label="Overall progress">
        <div class="progress-header">
          <span class="progress-title">Overall Progress</span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
        <div class="progress-track" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" id="progress-track">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
      </div>

      <!-- Current File -->
      <div class="current-file-section" role="region" aria-label="Currently processing">
        <span class="current-file-label">Now processing</span>
        <span class="current-file-name" id="current-file">—</span>
      </div>

      <!-- Logs -->
      <div class="logs-section" role="region" aria-label="Processing logs">
        <div class="logs-header">
          <div class="logs-header-left">
            <div class="logs-dot" id="logs-dot"></div>
            Live Logs
          </div>
          <button id="btn-clear-logs" aria-label="Clear log output">Clear</button>
        </div>
        <div id="logs-container" aria-live="polite" aria-atomic="false"></div>
      </div>

    </div><!-- /.container -->
  </main>

  <!-- ── Footer ──────────────────────────────────────────────────── -->
  <footer>
    <div class="container">
      OCRExtract &nbsp;·&nbsp; Google Drive → OCR → Excel &nbsp;·&nbsp;
      Built with FastAPI &amp; Tesseract
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
